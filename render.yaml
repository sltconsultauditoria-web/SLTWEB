services:
  - type: web
    name: consultsltweb-backend
    branch: main
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main_enterprise:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: MONGO_URI
        sync: false
      - key: DB_NAME
        value: consultslt_db
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: https://sltconsultauditoria-web.github.io
      - key: FRONTEND_URL
        value: https://sltconsultauditoria-web.github.io
      - key: REDIS_URL
        sync: false
      - key: ASYNC_USE_REDIS
        value: "0"
      - key: ENV
        value: production
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.11
