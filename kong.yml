_format_version: "3.0"
_transform: true

services:
  - name: consultslt-service
    url: http://localhost:8000
    routes:
      - name: consultslt-route
        paths:
          - /api

plugins:
  - name: cors
    service: consultslt-service
    config:
      origins:
        - https://sltconsultauditoria-web.github.io
        - https://192.168.5.162:3000
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
      credentials: true
      max_age: 3600
