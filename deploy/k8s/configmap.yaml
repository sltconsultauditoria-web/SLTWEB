apiVersion: v1
kind: ConfigMap
metadata:
  name: consultslt-config
  namespace: consultslt
data:
  APP_ENV: "production"
  DB_NAME: "consultslt_db"
  MONGO_URL: "mongodb://mongo:27017/consultslt_db"
  REDIS_URL: "redis://redis:6379/0"
  ASYNC_USE_REDIS: "1"
  WORKER_POLL_INTERVAL_SECONDS: "1"
  CORS_ORIGINS: "https://sltconsultauditoria-web.github.io"
  FRONTEND_ORIGIN: "https://sltconsultauditoria-web.github.io"
