name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "requirements.txt"
      - "docker-compose*.yml"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:
    inputs:
      push:
        description: "Push images to GHCR"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'workflow_dispatch' && inputs.push == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: ${{ github.event_name == 'workflow_dispatch' && inputs.push == 'true' }}
          tags: ghcr.io/${{ github.repository }}/consultslt-backend:${{ github.sha }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: ${{ github.event_name == 'workflow_dispatch' && inputs.push == 'true' }}
          tags: ghcr.io/${{ github.repository }}/consultslt-frontend:${{ github.sha }}
