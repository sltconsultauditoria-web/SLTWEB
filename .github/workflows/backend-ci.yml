name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/backend-ci.yml"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m py_compile backend/main_enterprise.py backend/core/security.py backend/workers/async_jobs.py tests/test_api_endpoints.py
      - run: python -m pytest tests -q
        env:
          APP_ENV: test
          MONGO_URL: mongodb://localhost:27017/consultslt_db
          REDIS_URL: redis://localhost:6379/0
          ASYNC_USE_REDIS: "0"
